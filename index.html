<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>微信</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: #f5f5f5;
            min-height: 100vh;
            overflow-x: hidden;
        }
        .app {
            max-width: 430px;
            margin: 0 auto;
            min-height: 100vh;
            background: #fff;
            position: relative;
        }
        
        /* 通用弹窗样式 */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }
        .modal.show { display: flex; }
        .modal-content {
            background: white;
            border-radius: 10px;
            padding: 20px;
            width: 85%;
            max-width: 350px;
            max-height: 80vh;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
        }
        .modal-header {
            font-size: 18px;
            font-weight: bold;
            text-align: center;
            margin-bottom: 15px;
            color: #333;
        }
        .input-group {
            margin-bottom: 12px;
        }
        .input-group label {
            display: block;
            font-size: 14px;
            color: #666;
            margin-bottom: 5px;
        }
        .input-group input, .input-group textarea, .input-group select {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 14px;
            -webkit-appearance: none;
        }
        .input-group textarea {
            resize: none;
            height: 80px;
        }
        .btn {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
            margin-top: 10px;
        }
        .btn-primary { background: #1e90ff; color: white; }
        .btn-secondary { background: #f0f0f0; color: #333; }
        .btn-danger { background: #ff4d4f; color: white; }
        
        /* 登录页 */
        .login-page {
            min-height: 100vh;
            background: linear-gradient(135deg, #1e90ff 0%, #00d4ff 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .login-logo {
            width: 80px;
            height: 80px;
            background: white;
            border-radius: 15px;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 30px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.2);
            font-size: 40px;
        }
        .login-title {
            color: white;
            font-size: 28px;
            font-weight: bold;
            margin-bottom: 40px;
        }
        .login-form { width: 100%; max-width: 300px; }
        .login-form input {
            width: 100%;
            padding: 15px;
            margin-bottom: 15px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
        }
        .login-form .btn { padding: 15px; background: white; color: #1e90ff; font-weight: bold; }
        .login-links {
            margin-top: 20px;
            text-align: center;
        }
        .login-links a {
            color: white;
            text-decoration: none;
            font-size: 14px;
            margin: 0 10px;
        }
        
        /* 主页面 */
        .main-page { display: none; min-height: 100vh; }
        .main-page.show { display: block; }
        
        .header {
            background: #1e90ff;
            color: white;
            padding: 12px 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .header-title { font-size: 18px; font-weight: bold; }
        .header-btn { font-size: 24px; cursor: pointer; }
        
        .chat-list { padding: 10px 0; }
        .chat-item {
            display: flex;
            padding: 12px 15px;
            align-items: center;
            cursor: pointer;
            border-bottom: 1px solid #f0f0f0;
        }
        .chat-item:hover { background: #f9f9f9; }
        .chat-avatar {
            width: 50px;
            height: 50px;
            border-radius: 5px;
            background: #ddd;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 24px;
            margin-right: 12px;
            overflow: hidden;
        }
        .chat-avatar img { width: 100%; height: 100%; object-fit: cover; }
        .chat-info { flex: 1; overflow: hidden; }
        .chat-name { font-size: 16px; color: #333; margin-bottom: 3px; }
        .chat-last-msg { font-size: 14px; color: #999; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .chat-time { font-size: 12px; color: #999; margin-left: 10px; }
        .unread-badge { background: #ff4d4f; color: white; font-size: 12px; padding: 2px 6px; border-radius: 10px; margin-left: 10px; }
        
        /* 底部导航 */
        .tab-bar {
            position: fixed;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 100%;
            max-width: 430px;
            background: #f7f7f7;
            border-top: 1px solid #ddd;
            display: flex;
            z-index: 100;
        }
        .tab-item {
            flex: 1;
            text-align: center;
            padding: 8px 0;
            cursor: pointer;
            font-size: 10px;
            color: #666;
        }
        .tab-item.active { color: #1e90ff; }
        .tab-item span { font-size: 22px; display: block; margin-bottom: 2px; }
        
        /* 聊天页面 */
        .chat-page {
            display: none;
            position: fixed;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 100%;
            max-width: 430px;
            height: 100vh;
            background: #f5f5f5;
            z-index: 200;
            flex-direction: column;
        }
        .chat-page.show { display: flex; }
        .chat-header { background: #1e90ff; color: white; padding: 12px 15px; display: flex; align-items: center; }
        .chat-back { font-size: 24px; margin-right: 15px; cursor: pointer; }
        .chat-header-title { font-size: 18px; flex: 1; }
        .chat-header-btn { font-size: 24px; cursor: pointer; }
        .chat-messages { flex: 1; overflow-y: auto; padding: 15px; -webkit-overflow-scrolling: touch; }
        .msg-item { margin-bottom: 15px; display: flex; }
        .msg-item.my { flex-direction: row-reverse; }
        .msg-avatar {
            width: 40px;
            height: 40px;
            border-radius: 5px;
            background: #ddd;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 20px;
            flex-shrink: 0;
            overflow: hidden;
        }
        .msg-avatar img { width: 100%; height: 100%; object-fit: cover; }
        .msg-content { max-width: 70%; margin: 0 10px; }
        .msg-bubble { padding: 10px 15px; border-radius: 8px; background: white; font-size: 16px; line-height: 1.4; word-break: break-word; }
        .msg-item.my .msg-bubble { background: #95ec69; }
        .msg-time { font-size: 11px; color: #999; margin-top: 3px; text-align: right; }
        .msg-item.my .msg-time { text-align: left; }
        .chat-input-area { background: #f7f7f7; padding: 10px; display: flex; align-items: center; border-top: 1px solid #ddd; }
        .chat-input { flex: 1; padding: 10px 15px; border: 1px solid #ddd; border-radius: 20px; font-size: 16px; background: white; -webkit-appearance: none; }
        .chat-send-btn { margin-left: 10px; padding: 10px 20px; background: #1e90ff; color: white; border: none; border-radius: 20px; font-size: 14px; cursor: pointer; }
        
        /* 联系人页面 */
        .contact-page { display: none; min-height: calc(100vh - 60px); padding-bottom: 70px; }
        .contact-page.show { display: block; }
        .contact-section { margin-bottom: 15px; }
        .contact-section-title { padding: 8px 15px; font-size: 14px; color: #999; background: #f5f5f5; }
        .contact-item {
            display: flex;
            padding: 12px 15px;
            align-items: center;
            background: white;
            cursor: pointer;
            border-bottom: 1px solid #f0f0f0;
        }
        .contact-item:hover { background: #f9f9f9; }
        .contact-avatar { width: 45px; height: 45px; border-radius: 5px; background: #ddd; display: flex; justify-content: center; align-items: center; font-size: 22px; margin-right: 12px; overflow: hidden; }
        .contact-avatar img { width: 100%; height: 100%; object-fit: cover; }
        .contact-name { flex: 1; font-size: 16px; color: #333; }
        
        /* 发现页面 */
        .discovery-page { display: none; min-height: calc(100vh - 60px); padding-bottom: 70px; }
        .discovery-page.show { display: block; }
        .discovery-item { display: flex; padding: 15px; background: white; align-items: center; cursor: pointer; border-bottom: 1px solid #f0f0f0; }
        .discovery-item:hover { background: #f9f9f9; }
        .discovery-item span:first-child { font-size: 24px; margin-right: 12px; }
        .discovery-item span:last-child { flex: 1; font-size: 16px; color: #333; }
        
        /* 我的页面 */
        .my-page { display: none; min-height: calc(100vh - 60px); padding-bottom: 70px; }
        .my-page.show { display: block; }
        .my-profile { padding: 30px 20px; background: white; display: flex; align-items: center; cursor: pointer; }
        .my-avatar { width: 70px; height: 70px; border-radius: 8px; background: #ddd; display: flex; justify-content: center; align-items: center; font-size: 35px; margin-right: 15px; overflow: hidden; }
        .my-avatar img { width: 100%; height: 100%; object-fit: cover; }
        .my-info { flex: 1; }
        .my-name { font-size: 20px; font-weight: bold; color: #333; margin-bottom: 5px; }
        .my-id { font-size: 14px; color: #999; }
        .my-menu { margin-top: 15px; background: white; }
        .my-menu-item { display: flex; padding: 15px; align-items: center; cursor: pointer; border-bottom: 1px solid #f0f0f0; }
        .my-menu-item:hover { background: #f9f9f9; }
        .my-menu-item span:first-child { font-size: 22px; margin-right: 12px; }
        .my-menu-item span:last-child { flex: 1; font-size: 16px; color: #333; }
        
        /* AI助手 */
        .ai-assistant {
            position: fixed;
            bottom: 70px;
            right: 15px;
            width: 50px;
            height: 50px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            box-shadow: 0 3px 15px rgba(102, 126, 234, 0.4);
            z-index: 50;
        }
        .ai-assistant span { font-size: 26px; color: white; }
        
        /* 好友申请列表 */
        .request-list { max-height: 300px; overflow-y: auto; }
        .request-item { display: flex; padding: 12px; border-bottom: 1px solid #f0f0f0; }
        .request-item:last-child { border-bottom: none; }
        .request-avatar { width: 45px; height: 45px; border-radius: 5px; background: #ddd; display: flex; justify-content: center; align-items: center; font-size: 22px; margin-right: 10px; overflow: hidden; }
        .request-info { flex: 1; }
        .request-name { font-size: 15px; font-weight: bold; margin-bottom: 3px; }
        .request-msg { font-size: 13px; color: #666; }
        .request-actions { display: flex; flex-direction: column; justify-content: center; gap: 5px; }
        .request-btn { padding: 5px 12px; border: none; border-radius: 3px; font-size: 12px; cursor: pointer; }
        .request-btn.accept { background: #1e90ff; color: white; }
        .request-btn.reject { background: #ddd; color: #666; }
        
        /* 空状态 */
        .empty-state { text-align: center; padding: 60px 20px; color: #999; }
        .empty-state span { font-size: 60px; display: block; margin-bottom: 15px; }
        .empty-state p { font-size: 14px; }
        
        /* 搜索页 */
        .search-page { display: none; position: fixed; top: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 430px; height: 100vh; background: white; z-index: 200; }
        .search-page.show { display: block; }
        .search-header { display: flex; padding: 10px 15px; align-items: center; background: #f5f5f5; }
        .search-input-wrapper { flex: 1; display: flex; background: white; border-radius: 5px; padding: 0 10px; align-items: center; }
        .search-input-wrapper span { font-size: 18px; color: #999; margin-right: 8px; }
        .search-input-wrapper input { flex: 1; padding: 8px 0; border: none; font-size: 15px; -webkit-appearance: none; }
        .search-cancel { margin-left: 10px; color: #1e90ff; font-size: 14px; cursor: pointer; }
        .search-result { padding: 15px; cursor: pointer; border-bottom: 1px solid #f0f0f0; }
        .search-result:hover { background: #f9f9f9; }
        .search-result-name { font-size: 16px; font-weight: bold; margin-bottom: 3px; }
        .search-result-id { font-size: 13px; color: #999; }
        
        /* Toast提示 */
        .toast { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(0,0,0,0.7); color: white; padding: 12px 25px; border-radius: 5px; font-size: 14px; z-index: 9999; display: none; }
        .toast.show { display: block; }
        
        /* 时间戳分隔 */
        .time-divider { text-align: center; padding: 10px; font-size: 12px; color: #999; }
        
        /* 管理员面板 */
        .admin-panel { display: none; min-height: calc(100vh - 60px); padding-bottom: 70px; }
        .admin-panel.show { display: block; }
        .admin-tabs { display: flex; background: white; border-bottom: 1px solid #ddd; }
        .admin-tab { flex: 1; padding: 12px; text-align: center; cursor: pointer; font-size: 14px; color: #666; border-bottom: 2px solid transparent; }
        .admin-tab.active { color: #1e90ff; border-bottom-color: #1e90ff; }
        .admin-content { padding: 15px; }
        .admin-form { background: white; padding: 15px; border-radius: 8px; margin-bottom: 15px; }
        .admin-form h3 { font-size: 16px; margin-bottom: 12px; color: #333; }
        .admin-list { background: white; border-radius: 8px; overflow: hidden; }
        .admin-list-item { display: flex; padding: 12px 15px; align-items: center; border-bottom: 1px solid #f0f0f0; }
        .admin-list-item:last-child { border-bottom: none; }
        .admin-user-info { flex: 1; }
        .admin-user-name { font-size: 15px; font-weight: bold; margin-bottom: 3px; }
        .admin-user-id { font-size: 12px; color: #999; }
        .admin-user-status { font-size: 12px; padding: 3px 8px; border-radius: 3px; margin-right: 10px; }
        .status-normal { background: #e6f7e6; color: #52c41a; }
        .status-frozen { background: #fff1f0; color: #ff4d4f; }
        .admin-actions { display: flex; gap: 8px; }
        .admin-actions button { padding: 6px 12px; border: none; border-radius: 4px; font-size: 12px; cursor: pointer; }
        .btn-view { background: #e6f7ff; color: #1e90ff; }
        .btn-freeze { background: #fff1f0; color: #ff4d4f; }
        .btn-unfreeze { background: #e6f7e6; color: #52c41a; }
        
        /* 冻结时间设置 */
        .freeze-time-inputs { display: flex; gap: 10px; flex-wrap: wrap; }
        .freeze-time-inputs .input-group { flex: 1; min-width: 80px; margin-bottom: 0; }
    </style>
</head>
<body>
    <div class="app">
        <!-- 登录页 -->
        <div class="login-page" id="loginPage">
            <div class="login-logo">💬</div>
            <div class="login-title">微信</div>
            <div class="login-form">
                <input type="text" id="loginId" placeholder="微信号" />
                <input type="password" id="loginPwd" placeholder="密码" />
                <button class="btn" onclick="doLogin()">登录</button>
            </div>
            <div class="login-links">
                <a href="#" onclick="showRegister()">注册账号</a>
            </div>
        </div>
        
        <!-- 主页面 -->
        <div class="main-page" id="mainPage">
            <div class="header">
                <div class="header-title">微信</div>
                <div class="header-btn" onclick="showSearch()">🔍</div>
            </div>
            <div class="chat-list" id="chatList"></div>
            
            <!-- 底部导航 -->
            <div class="tab-bar">
                <div class="tab-item active" onclick="switchTab(0)"><span>💬</span>聊天</div>
                <div class="tab-item" onclick="switchTab(1)"><span>👥</span>通讯录</div>
                <div class="tab-item" onclick="switchTab(2)"><span>🔍</span>发现</div>
                <div class="tab-item" onclick="switchTab(3)"><span>👤</span>我</div>
            </div>
            
            <!-- 聊天列表（普通用户） -->
            <div class="contact-page" id="contactPage">
                <div class="contact-section">
                    <div class="contact-section-title">新的朋友</div>
                    <div class="contact-item" onclick="showFriendRequests()">
                        <div class="contact-avatar">👥</div>
                        <div class="contact-name">新的朋友</div>
                        <span id="requestBadge" style="display:none;background:#ff4d4f;color:white;font-size:12px;padding:2px 8px;border-radius:10px;"></span>
                    </div>
                </div>
                <div class="contact-section">
                    <div class="contact-section-title">联系人</div>
                    <div id="contactList"></div>
                </div>
            </div>
            
            <!-- 发现 -->
            <div class="discovery-page" id="discoveryPage">
                <div id="adminMenuItem" style="display:none;">
                    <div class="discovery-item" onclick="showAdminPanel()">
                        <span>🔐</span><span>管理面板</span>
                    </div>
                </div>
                <div class="discovery-item" onclick="showAIAssistant()">
                    <span>🤖</span><span>AI助手</span>
                </div>
            </div>
            
            <!-- 我的 -->
            <div class="my-page" id="myPage">
                <div class="my-profile" onclick="showEditProfile()">
                    <div class="my-avatar" id="myAvatar"></div>
                    <div class="my-info">
                        <div class="my-name" id="myName"></div>
                        <div class="my-id">微信号: <span id="myId"></span></div>
                    </div>
                </div>
                <div class="my-menu">
                    <div class="my-menu-item" onclick="showEditProfile()">
                        <span>📝</span><span>编辑资料</span>
                    </div>
                    <div class="my-menu-item" onclick="logout()">
                        <span>🚪</span><span>退出登录</span>
                    </div>
                </div>
            </div>
            
            <!-- 管理员面板 -->
            <div class="admin-panel" id="adminPanel">
                <div class="header">
                    <div class="header-title">管理面板</div>
                    <div class="header-btn" onclick="closeAdminPanel()">←</div>
                </div>
                <div class="admin-tabs">
                    <div class="admin-tab active" onclick="switchAdminTab(0)">账号管理</div>
                    <div class="admin-tab" onclick="switchAdminTab(1)">批量注册</div>
                    <div class="admin-tab" onclick="switchAdminTab(2)">聊天记录</div>
                </div>
                <div class="admin-content" id="adminContent"></div>
            </div>
            
            <!-- AI助手按钮 -->
            <div class="ai-assistant" onclick="showAIAssistant()"><span>🤖</span></div>
        </div>
        
        <!-- 聊天页面 -->
        <div class="chat-page" id="chatPage">
            <div class="chat-header">
                <div class="chat-back" onclick="closeChat()">←</div>
                <div class="chat-header-title" id="chatTitle"></div>
                <div class="chat-header-btn" onclick="showChatInfo()">ℹ️</div>
            </div>
            <div class="chat-messages" id="chatMessages"></div>
            <div class="chat-input-area">
                <input type="text" class="chat-input" id="chatInput" placeholder="输入消息..." />
                <button class="chat-send-btn" onclick="sendMessage()">发送</button>
            </div>
        </div>
        
        <!-- 搜索页 -->
        <div class="search-page" id="searchPage">
            <div class="search-header">
                <div class="search-input-wrapper">
                    <span>🔍</span>
                    <input type="text" id="searchInput" placeholder="搜索微信号" />
                </div>
                <div class="search-cancel" onclick="closeSearch()">取消</div>
            </div>
            <div id="searchResults"></div>
        </div>
    </div>
    
    <!-- 注册弹窗 -->
    <div class="modal" id="registerModal">
        <div class="modal-content">
            <div class="modal-header">注册账号</div>
            <div class="input-group">
                <label>微信号</label>
                <input type="text" id="regId" placeholder="设置微信号" />
            </div>
            <div class="input-group">
                <label>昵称</label>
                <input type="text" id="regName" placeholder="设置昵称" />
            </div>
            <div class="input-group">
                <label>密码</label>
                <input type="password" id="regPwd" placeholder="设置密码" />
            </div>
            <button class="btn btn-primary" onclick="doRegister()">注册</button>
            <button class="btn btn-secondary" onclick="closeModal('registerModal')">取消</button>
        </div>
    </div>
    
    <!-- 编辑资料弹窗 -->
    <div class="modal" id="editProfileModal">
        <div class="modal-content">
            <div class="modal-header">编辑资料</div>
            <div class="input-group">
                <label>昵称</label>
                <input type="text" id="editName" />
            </div>
            <div class="input-group">
                <label>个性签名</label>
                <textarea id="editBio" placeholder="签名"></textarea>
            </div>
            <div class="input-group">
                <label>头像（输入emoji）</label>
                <input type="text" id="editAvatar" placeholder="例如: 😎" />
            </div>
            <button class="btn btn-primary" onclick="saveProfile()">保存</button>
            <button class="btn btn-secondary" onclick="closeModal('editProfileModal')">取消</button>
        </div>
    </div>
    
    <!-- 好友申请弹窗 -->
    <div class="modal" id="friendRequestModal">
        <div class="modal-content">
            <div class="modal-header">好友申请</div>
            <div class="request-list" id="requestList"></div>
            <button class="btn btn-secondary" onclick="closeModal('friendRequestModal')">关闭</button>
        </div>
    </div>
    
    <!-- 添加好友弹窗 -->
    <div class="modal" id="addFriendModal">
        <div class="modal-content">
            <div class="modal-header">添加好友</div>
            <div class="input-group">
                <label>输入微信号</label>
                <input type="text" id="addFriendId" placeholder="对方微信号" />
            </div>
            <div class="input-group">
                <label>验证消息</label>
                <textarea id="addFriendMsg" placeholder="我是..."></textarea>
            </div>
            <button class="btn btn-primary" onclick="doAddFriend()">发送</button>
            <button class="btn btn-secondary" onclick="closeModal('addFriendModal')">取消</button>
        </div>
    </div>
    
    <!-- 冻结用户弹窗 -->
    <div class="modal" id="freezeModal">
        <div class="modal-content">
            <div class="modal-header">冻结用户</div>
            <p style="font-size:14px;color:#666;margin-bottom:15px;">设置冻结时长：</p>
            <div class="freeze-time-inputs">
                <div class="input-group">
                    <label>天</label>
                    <input type="number" id="freezeDays" value="0" min="0" />
                </div>
                <div class="input-group">
                    <label>时</label>
                    <input type="number" id="freezeHours" value="0" min="0" />
                </div>
                <div class="input-group">
                    <label>分</label>
                    <input type="number" id="freezeMins" value="0" min="0" />
                </div>
                <div class="input-group">
                    <label>秒</label>
                    <input type="number" id="freezeSecs" value="30" min="0" />
                </div>
            </div>
            <button class="btn btn-danger" onclick="confirmFreeze()">确认冻结</button>
            <button class="btn btn-secondary" onclick="closeModal('freezeModal')">取消</button>
        </div>
    </div>
    
    <!-- AI助手弹窗 -->
    <div class="modal" id="aiModal">
        <div class="modal-content">
            <div class="modal-header">AI助手</div>
            <div id="aiChat" style="height:300px;overflow-y:auto;padding:10px 0;border:1px solid #ddd;border-radius:5px;margin-bottom:10px;"></div>
            <div style="display:flex;">
                <input type="text" id="aiInput" placeholder="输入问题..." style="flex:1;padding:10px;border:1px solid #ddd;border-radius:5px;" />
                <button class="btn btn-primary" style="width:auto;margin-left:10px;padding:10px 15px;" onclick="askAI()">发送</button>
            </div>
            <button class="btn btn-secondary" style="margin-top:10px;" onclick="closeModal('aiModal')">关闭</button>
        </div>
    </div>
    
    <!-- Toast -->
    <div class="toast" id="toast"></div>

    <script>
        // 数据存储
        let users = JSON.parse(localStorage.getItem('wechat_users') || '{}');
        let chats = JSON.parse(localStorage.getItem('wechat_chats') || '{}');
        let friendRequests = JSON.parse(localStorage.getItem('wechat_requests') || '[]');
        let currentUser = null;
        let currentChat = null;
        let freezeTarget = null;
        
        // 初始化管理员账号
        function initAdmin() {
            if (!users['54188']) {
                users['54188'] = {
                    id: '54188',
                    name: '管理员',
                    pwd: '54188',
                    bio: '系统管理员',
                    avatar: '👑',
                    frozen: false,
                    freezeUntil: null
                };
                saveUsers();
            }
        }
        
        // 保存数据
        function saveUsers() { localStorage.setItem('wechat_users', JSON.stringify(users)); }
        function saveChats() { localStorage.setItem('wechat_chats', JSON.stringify(chats)); }
        function saveRequests() { localStorage.setItem('wechat_requests', JSON.stringify(friendRequests)); }
        
        // Toast提示
        function showToast(msg) {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 2000);
        }
        
        // 弹窗控制
        function openModal(id) { document.getElementById(id).classList.add('show'); }
        function closeModal(id) { document.getElementById(id).classList.remove('show'); }
        
        // 检查冻结状态
        function checkFreeze(user) {
            if (user.frozen && user.freezeUntil) {
                if (Date.now() < user.freezeUntil) {
                    const left = Math.ceil((user.freezeUntil - Date.now()) / 1000);
                    const h = Math.floor(left / 3600);
                    const m = Math.floor((left % 3600) / 60);
                    const s = left % 60;
                    return `账号已冻结，剩余 ${h}时${m}分${s}秒`;
                } else {
                    user.frozen = false;
                    user.freezeUntil = null;
                    saveUsers();
                }
            }
            return null;
        }
        
        // 登录（管理员和普通用户共用）
        function doLogin() {
            const id = document.getElementById('loginId').value.trim();
            const pwd = document.getElementById('loginPwd').value;
            
            if (!id || !pwd) { showToast('请输入账号和密码'); return; }
            
            const user = users[id];
            if (!user) { showToast('账号不存在'); return; }
            
            const freezeMsg = checkFreeze(user);
            if (freezeMsg) { showToast(freezeMsg); return; }
            
            if (user.pwd !== pwd) { showToast('密码错误'); return; }
            
            currentUser = user;
            document.getElementById('loginPage').style.display = 'none';
            document.getElementById('mainPage').classList.add('show');
            updateMainUI();
        }
        
        // 注册
        function doRegister() {
            const id = document.getElementById('regId').value.trim();
            const name = document.getElementById('regName').value.trim();
            const pwd = document.getElementById('regPwd').value;
            
            if (!id || !name || !pwd) { showToast('请填写完整'); return; }
            if (users[id]) { showToast('账号已存在'); return; }
            
            users[id] = { id, name, pwd, bio: '', avatar: '😀', frozen: false, freezeUntil: null };
            saveUsers();
            showToast('注册成功');
            closeModal('registerModal');
        }
        
        // 更新主界面
        function updateMainUI() {
            document.getElementById('myAvatar').innerHTML = currentUser.avatar || '😀';
            document.getElementById('myName').textContent = currentUser.name;
            document.getElementById('myId').textContent = currentUser.id;
            
            // 管理员显示管理面板入口
            if (currentUser.id === '54188') {
                document.getElementById('adminMenuItem').style.display = 'block';
            } else {
                document.getElementById('adminMenuItem').style.display = 'none';
            }
            
            renderChatList();
            renderContacts();
            updateRequestBadge();
        }
        
        // 渲染聊天列表
        function renderChatList() {
            const list = document.getElementById('chatList');
            const userChats = chats[currentUser.id] || [];
            
            if (userChats.length === 0) {
                list.innerHTML = '<div class="empty-state"><span>💬</span><p>暂无聊天记录</p></div>';
                return;
            }
            
            list.innerHTML = userChats.map(chat => {
                const friend = users[chat.friendId] || { name: '未知', avatar: '❓' };
                const lastMsg = chat.messages.length > 0 ? chat.messages[chat.messages.length - 1] : null;
                const lastText = lastMsg ? (lastMsg.type === 'text' ? lastMsg.content : '[图片]') : '';
                const time = lastMsg ? formatTime(lastMsg.time) : '';
                const unread = chat.messages.filter(m => !m.read && m.from === chat.friendId).length;
                
                return `
                    <div class="chat-item" onclick="openChat('${chat.friendId}')">
                        <div class="chat-avatar">${friend.avatar || '😀'}</div>
                        <div class="chat-info">
                            <div class="chat-name">${friend.name}</div>
                            <div class="chat-last-msg">${lastText}</div>
                        </div>
                        <div>
                            <div class="chat-time">${time}</div>
                            ${unread > 0 ? `<div class="unread-badge">${unread}</div>` : ''}
                        </div>
                    </div>
                `;
            }).join('');
        }
        
        // 渲染联系人
        function renderContacts() {
            const list = document.getElementById('contactList');
            const userChats = chats[currentUser.id] || [];
            const friends = userChats.map(c => users[c.friendId]).filter(Boolean);
            
            if (friends.length === 0) {
                list.innerHTML = '<div class="empty-state"><span>👥</span><p>暂无好友</p></div>';
                return;
            }
            
            list.innerHTML = friends.map(f => `
                <div class="contact-item" onclick="openChat('${f.id}')">
                    <div class="contact-avatar">${f.avatar || '😀'}</div>
                    <div class="contact-name">${f.name}</div>
                </div>
            `).join('');
        }
        
        // 更新申请徽章
        function updateRequestBadge() {
            const myRequests = friendRequests.filter(r => r.to === currentUser.id && r.status === 'pending');
            const badge = document.getElementById('requestBadge');
            if (myRequests.length > 0) {
                badge.style.display = 'block';
                badge.textContent = myRequests.length;
            } else {
                badge.style.display = 'none';
            }
        }
        
        // 打开聊天
        function openChat(friendId) {
            currentChat = friendId;
            const friend = users[friendId];
            if (!friend) return;
            
            document.getElementById('chatTitle').textContent = friend.name;
            renderMessages();
            
            // 标记已读
            let userChats = chats[currentUser.id] || [];
            let chat = userChats.find(c => c.friendId === friendId);
            if (chat) {
                chat.messages.forEach(m => { if (m.from === friendId) m.read = true; });
                saveChats();
            }
            
            document.getElementById('chatPage').classList.add('show');
            document.getElementById('chatInput').focus();
        }
        
        // 关闭聊天
        function closeChat() {
            document.getElementById('chatPage').classList.remove('show');
            currentChat = null;
            renderChatList();
        }
        
        // 渲染消息
        function renderMessages() {
            const container = document.getElementById('chatMessages');
            const userChats = chats[currentUser.id] || [];
            const chat = userChats.find(c => c.friendId === currentChat);
            
            if (!chat || chat.messages.length === 0) {
                container.innerHTML = '<div class="empty-state"><span>💬</span><p>暂无消息</p></div>';
                return;
            }
            
            let lastTime = 0;
            container.innerHTML = chat.messages.map((msg) => {
                const isMe = msg.from === currentUser.id;
                const friend = users[msg.from];
                const showTime = msg.time - lastTime > 300000;
                if (showTime) lastTime = msg.time;
                
                return `
                    ${showTime ? `<div class="time-divider">${formatTime(msg.time)}</div>` : ''}
                    <div class="msg-item ${isMe ? 'my' : ''}">
                        <div class="msg-avatar">${(friend || currentUser).avatar || '😀'}</div>
                        <div class="msg-content">
                            <div class="msg-bubble">${msg.content}</div>
                            <div class="msg-time">${formatTime(msg.time)}</div>
                        </div>
                    </div>
                `;
            }).join('');
            
            container.scrollTop = container.scrollHeight;
        }
        
        // 发送消息
        function sendMessage() {
            const input = document.getElementById('chatInput');
            const content = input.value.trim();
            if (!content) return;
            
            const msg = {
                from: currentUser.id,
                to: currentChat,
                content,
                type: 'text',
                time: Date.now(),
                read: true
            };
            
            // 保存到发送方
            if (!chats[currentUser.id]) chats[currentUser.id] = [];
            let myChat = chats[currentUser.id].find(c => c.friendId === currentChat);
            if (!myChat) {
                myChat = { friendId: currentChat, messages: [] };
                chats[currentUser.id].push(myChat);
            }
            myChat.messages.push(msg);
            saveChats();
            
            // 保存到接收方
            if (!chats[currentChat]) chats[currentChat] = [];
            let friendChat = chats[currentChat].find(c => c.friendId === currentUser.id);
            if (!friendChat) {
                friendChat = { friendId: currentUser.id, messages: [] };
                chats[currentChat].push(friendChat);
            }
            friendChat.messages.push({ ...msg, read: false });
            saveChats();
            
            input.value = '';
            renderMessages();
        }
        
        // Tab切换
        function switchTab(idx) {
            document.querySelectorAll('.tab-item').forEach((t, i) => t.classList.toggle('active', i === idx));
            document.querySelectorAll('.header').forEach(h => h.style.display = idx === 0 ? 'flex' : 'none');
            document.getElementById('chatList').style.display = idx === 0 ? 'block' : 'none';
            document.getElementById('contactPage').classList.toggle('show', idx === 1);
            document.getElementById('discoveryPage').classList.toggle('show', idx === 2);
            document.getElementById('myPage').classList.toggle('show', idx === 3);
            document.getElementById('adminPanel').classList.remove('show');
        }
        
        // 搜索
        function showSearch() {
            openModal('searchPage');
            document.getElementById('searchInput').focus();
        }
        function closeSearch() { closeModal('searchPage'); }
        
        document.getElementById('searchInput').addEventListener('input', function() {
            const q = this.value.trim().toLowerCase();
            const results = document.getElementById('searchResults');
            
            if (!q) { results.innerHTML = ''; return; }
            
            const found = Object.values(users).filter(u => 
                u.id !== currentUser.id && 
                (u.id.toLowerCase().includes(q) || u.name.toLowerCase().includes(q))
            );
            
            if (found.length === 0) {
                results.innerHTML = '<div class="empty-state"><span>🔍</span><p>未找到用户</p></div>';
                return;
            }
            
            results.innerHTML = found.map(u => `
                <div class="search-result" onclick="openUserProfile('${u.id}')">
                    <div class="search-result-name">${u.avatar || '😀'} ${u.name}</div>
                    <div class="search-result-id">微信号: ${u.id}</div>
                </div>
            `).join('');
        });
        
        // 打开用户资料
        function openUserProfile(userId) {
            const user = users[userId];
            if (!user) return;
            
            closeSearch();
            
            // 检查是否已是好友
            const userChats = chats[currentUser.id] || [];
            const isFriend = userChats.some(c => c.friendId === userId);
            
            if (isFriend) {
                openChat(userId);
            } else {
                document.getElementById('addFriendId').value = userId;
                openModal('addFriendModal');
            }
        }
        
        // 添加好友
        function doAddFriend() {
            const friendId = document.getElementById('addFriendId').value.trim();
            const msg = document.getElementById('addFriendMsg').value.trim() || '你好';
            
            if (!friendId) { showToast('请输入微信号'); return; }
            if (friendId === currentUser.id) { showToast('不能添加自己'); return; }
            if (!users[friendId]) { showToast('用户不存在'); return; }
            
            // 检查是否已有申请
            const exists = friendRequests.some(r => 
                r.from === currentUser.id && r.to === friendId && r.status === 'pending'
            );
            if (exists) { showToast('已发送过申请'); return; }
            
            friendRequests.push({
                from: currentUser.id,
                fromName: currentUser.name,
                to: friendId,
                msg,
                status: 'pending',
                time: Date.now()
            });
            saveRequests();
            showToast('申请已发送');
            closeModal('addFriendModal');
            document.getElementById('addFriendMsg').value = '';
        }
        
        // 显示好友申请
        function showFriendRequests() {
            const myRequests = friendRequests.filter(r => r.to === currentUser.id);
            const list = document.getElementById('requestList');
            
            if (myRequests.length === 0) {
                list.innerHTML = '<div class="empty-state"><span>📭</span><p>暂无申请</p></div>';
            } else {
                list.innerHTML = myRequests.map((r, idx) => `
                    <div class="request-item">
                        <div class="request-avatar">${users[r.from]?.avatar || '😀'}</div>
                        <div class="request-info">
                            <div class="request-name">${r.fromName}</div>
                            <div class="request-msg">${r.msg}</div>
                        </div>
                        <div class="request-actions">
                            ${r.status === 'pending' ? `
                                <button class="request-btn accept" onclick="handleRequest(${idx}, 'accept')">同意</button>
                                <button class="request-btn reject" onclick="handleRequest(${idx}, 'reject')">拒绝</button>
                            ` : `<span style="font-size:12px;color:#999;">${r.status === 'accepted' ? '已同意' : '已拒绝'}</span>`}
                        </div>
                    </div>
                `).join('');
            }
            
            openModal('friendRequestModal');
        }
        
        // 处理好友申请
        function handleRequest(idx, action) {
            const req = friendRequests[idx];
            req.status = action === 'accept' ? 'accepted' : 'rejected';
            saveRequests();
            
            if (action === 'accept') {
                if (!chats[currentUser.id]) chats[currentUser.id] = [];
                if (!chats[req.from]) chats[req.from] = [];
                
                if (!chats[currentUser.id].some(c => c.friendId === req.from)) {
                    chats[currentUser.id].push({ friendId: req.from, messages: [] });
                }
                if (!chats[req.from].some(c => c.friendId === currentUser.id)) {
                    chats[req.from].push({ friendId: currentUser.id, messages: [] });
                }
                saveChats();
                showToast('已添加好友');
            }
            
            showFriendRequests();
            renderContacts();
        }
        
        // 编辑资料
        function showEditProfile() {
            document.getElementById('editName').value = currentUser.name;
            document.getElementById('editBio').value = currentUser.bio || '';
            document.getElementById('editAvatar').value = currentUser.avatar || '';
            openModal('editProfileModal');
        }
        
        function saveProfile() {
            currentUser.name = document.getElementById('editName').value.trim() || currentUser.name;
            currentUser.bio = document.getElementById('editBio').value.trim();
            currentUser.avatar = document.getElementById('editAvatar').value.trim() || currentUser.avatar;
            saveUsers();
            updateMainUI();
            closeModal('editProfileModal');
            showToast('已保存');
        }
        
        // 退出登录
        function logout() {
            if (confirm('确定退出登录？')) {
                currentUser = null;
                document.getElementById('mainPage').classList.remove('show');
                document.getElementById('loginPage').style.display = 'flex';
            }
        }
        
        // 显示注册
        function showRegister() { openModal('registerModal'); }
        
        // 显示聊天信息
        function showChatInfo() {
            const friend = users[currentChat];
            if (!friend) return;
            showToast(`微信号: ${friend.id}`);
        }
        
        // ====== 管理员面板 ======
        function showAdminPanel() {
            document.getElementById('chatList').style.display = 'none';
            document.getElementById('adminPanel').classList.add('show');
            renderAdminContent(0);
        }
        
        function closeAdminPanel() {
            document.getElementById('adminPanel').classList.remove('show');
            document.getElementById('chatList').style.display = 'block';
        }
        
        function switchAdminTab(idx) {
            document.querySelectorAll('.admin-tab').forEach((t, i) => t.classList.toggle('active', i === idx));
            renderAdminContent(idx);
        }
        
        function renderAdminContent(tab) {
            const container = document.getElementById('adminContent');
            
            if (tab === 0) {
                // 账号管理
                const allUsers = Object.values(users).filter(u => u.id !== '54188');
                container.innerHTML = `
                    <div class="admin-list">
                        ${allUsers.length === 0 ? '<div class="empty-state"><span>👥</span><p>暂无用户</p></div>' : allUsers.map(u => {
                            const freezeMsg = u.frozen && u.freezeUntil ? `（剩余${formatRemainTime(u.freezeUntil)}）` : '';
                            return `
                                <div class="admin-list-item">
                                    <div class="contact-avatar">${u.avatar || '😀'}</div>
                                    <div class="admin-user-info">
                                        <div class="admin-user-name">${u.name} ${freezeMsg}</div>
                                        <div class="admin-user-id">ID: ${u.id}</div>
                                    </div>
                                    <span class="admin-user-status ${u.frozen ? 'status-frozen' : 'status-normal'}">
                                        ${u.frozen ? '已冻结' : '正常'}
                                    </span>
                                    <div class="admin-actions">
                                        <button class="btn-view" onclick="viewUserChats('${u.id}')">聊天</button>
                                        ${u.frozen ? 
                                            `<button class="btn-unfreeze" onclick="unfreezeUser('${u.id}')">解冻</button>` : 
                                            `<button class="btn-freeze" onclick="showFreezeUser('${u.id}')">冻结</button>`
                                        }
                                    </div>
                                </div>
                            `;
                        }).join('')}
                    </div>
                `;
            } else if (tab === 1) {
                // 批量注册
                container.innerHTML = `
                    <div class="admin-form">
                        <h3>批量生成账号</h3>
                        <div class="input-group">
                            <label>起始微信号</label>
                            <input type="number" id="batchStart" placeholder="例如: 123456" />
                        </div>
                        <div class="input-group">
                            <label>生成数量</label>
                            <input type="number" id="batchCount" value="10" min="1" max="100" />
                        </div>
                        <button class="btn btn-primary" onclick="batchCreateUsers()">批量创建</button>
                    </div>
                `;
            } else if (tab === 2) {
                // 聊天记录
                const allUsers = Object.values(users).filter(u => u.id !== '54188');
                container.innerHTML = `
                    <div class="input-group">
                        <label>选择用户查看聊天记录</label>
                        <select id="chatUserSelect" onchange="viewAllChats(this.value)">
                            <option value="">-- 选择用户 --</option>
                            ${allUsers.map(u => `<option value="${u.id}">${u.name} (${u.id})</option>`).join('')}
                        </select>
                    </div>
                    <div id="allChatsContent" style="margin-top:15px;"></div>
                `;
            }
        }
        
        // 批量创建用户
        function batchCreateUsers() {
            const start = parseInt(document.getElementById('batchStart').value);
            const count = parseInt(document.getElementById('batchCount').value);
            
            if (!start || !count) { showToast('请填写完整'); return; }
            
            let created = 0;
            for (let i = 0; i < count; i++) {
                const id = String(start + i);
                if (!users[id]) {
                    users[id] = {
                        id,
                        name: `用户${id}`,
                        pwd: id,
                        bio: '',
                        avatar: '😀',
                        frozen: false,
                        freezeUntil: null
                    };
                    created++;
                }
            }
            
            saveUsers();
            showToast(`成功创建 ${created} 个账号`);
            renderAdminContent(1);
        }
        
        // 解冻用户
        function unfreezeUser(userId) {
            users[userId].frozen = false;
            users[userId].freezeUntil = null;
            saveUsers();
            showToast('已解冻');
            renderAdminContent(0);
        }
        
        // 显示冻结弹窗
        function showFreezeUser(userId) {
            freezeTarget = userId;
            document.getElementById('freezeDays').value = 0;
            document.getElementById('freezeHours').value = 0;
            document.getElementById('freezeMins').value = 0;
            document.getElementById('freezeSecs').value = 30;
            openModal('freezeModal');
        }
        
        // 确认冻结
        function confirmFreeze() {
            if (!freezeTarget) return;
            
            const days = parseInt(document.getElementById('freezeDays').value) || 0;
            const hours = parseInt(document.getElementById('freezeHours').value) || 0;
            const mins = parseInt(document.getElementById('freezeMins').value) || 0;
            const secs = parseInt(document.getElementById('freezeSecs').value) || 0;
            
            const totalMs = (days * 86400 + hours * 3600 + mins * 60 + secs) * 1000;
            if (totalMs <= 0) { showToast('请设置冻结时间'); return; }
            
            users[freezeTarget].frozen = true;
            users[freezeTarget].freezeUntil = Date.now() + totalMs;
            saveUsers();
            
            showToast(`已冻结 ${days}天${hours}时${mins}分${secs}秒`);
            closeModal('freezeModal');
            renderAdminContent(0);
        }
        
        // 查看用户聊天记录
        function viewUserChats(userId) {
            const userChats = chats[userId] || [];
            const content = document.getElementById('allChatsContent') || document.createElement('div');
            
            if (!document.getElementById('allChatsContent')) {
                const container = document.getElementById('adminContent');
                const div = document.createElement('div');
                div.id = 'allChatsContent';
                div.style.marginTop = '15px';
                container.appendChild(div);
            }
            
            const div = document.getElementById('allChatsContent');
            if (userChats.length === 0) {
                div.innerHTML = '<div class="empty-state"><span>💬</span><p>暂无聊天记录</p></div>';
                return;
            }
            
            div.innerHTML = userChats.map(chat => {
                const friend = users[chat.friendId];
                return `
                    <div style="background:#f9f9f9;padding:10px;margin-bottom:10px;border-radius:5px;">
                        <div style="font-weight:bold;margin-bottom:5px;">与 ${friend?.name || '未知'} (${chat.friendId}) 的聊天</div>
                        <div style="font-size:12px;color:#666;max-height:150px;overflow-y:auto;">
                            ${chat.messages.slice(-20).map(m => `
                                <div style="margin:5px 0;">
                                    <span style="color:${m.from === userId ? '#1e90ff' : '#52c41a'};">${m.from === userId ? friend?.name || '对方' : users[m.from]?.name || '未知'}</span>
                                    : ${m.content}
                                </div>
                            `).join('')}
                        </div>
                    </div>
                `;
            }).join('');
        }
        
        // 查看所有聊天记录
        function viewAllChats(userId) {
            if (!userId) return;
            viewUserChats(userId);
        }
        
        // AI助手
        function showAIAssistant() {
            openModal('aiModal');
            document.getElementById('aiInput').focus();
        }
        
        function askAI() {
            const input = document.getElementById('aiInput');
            const q = input.value.trim();
            if (!q) return;
            
            const chat = document.getElementById('aiChat');
            chat.innerHTML += `<div style="margin-bottom:10px;"><strong>你：</strong>${q}</div>`;
            input.value = '';
            
            const replies = [
                '这个问题很有趣呢！有什么我可以帮你的吗？',
                '让我想想...这个问题我需要更多信息才能回答。',
                '好的，我明白了。你可以告诉我更多细节吗？',
                '这是一个不错的话题！',
                '我可以帮你处理微信相关的操作，比如添加好友、查看聊天记录等。'
            ];
            const reply = replies[Math.floor(Math.random() * replies.length)];
            
            setTimeout(() => {
                chat.innerHTML += `<div style="margin-bottom:10px;color:#1e90ff;"><strong>AI：</strong>${reply}</div>`;
                chat.scrollTop = chat.scrollHeight;
            }, 500);
        }
        
        // 格式化时间
        function formatTime(ts) {
            const d = new Date(ts);
            const now = new Date();
            const diff = now - d;
            
            if (diff < 86400000 && d.getDate() === now.getDate()) {
                return `${d.getHours().toString().padStart(2,'0')}:${d.getMinutes().toString().padStart(2,'0')}`;
            } else if (diff < 604800000) {
                const days = ['日','一','二','三','四','五','六'];
                return `周${days[d.getDay()]}`;
            } else {
                return `${d.getMonth()+1}/${d.getDate()}`;
            }
        }
        
        // 格式化剩余时间
        function formatRemainTime(ts) {
            const left = Math.ceil((ts - Date.now()) / 1000);
            if (left <= 0) return '已到期';
            const h = Math.floor(left / 3600);
            const m = Math.floor((left % 3600) / 60);
            const s = left % 60;
            return `${h}时${m}分${s}秒`;
        }
        
        // 回车登录
        document.addEventListener('DOMContentLoaded', function() {
            initAdmin();
            document.getElementById('loginPwd').addEventListener('keypress', function(e) {
                if (e.key === 'Enter') doLogin();
            });
            document.getElementById('chatInput').addEventListener('keypress', function(e) {
                if (e.key === 'Enter') sendMessage();
            });
            document.getElementById('aiInput').addEventListener('keypress', function(e) {
                if (e.key === 'Enter') askAI();
            });
        });
    </script>
</body>
